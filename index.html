<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ma Blu-ray Thèque</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CinéLib">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#111827">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3507/3507102.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        #suggestions { z-index: 5000 !important; max-height: 350px; overflow-y: auto; background: #1f2937; border: 1px solid #4b5563; }
        .suggestion-item:hover { background-color: #374151; cursor: pointer; }
        .badge-3d { background: linear-gradient(90deg, #00d2ff 0%, #3a7bd5 100%); color: white; }
        .badge-4k { background-color: #7c3aed; color: white; }
        .editing-mode { border: 2px solid #3b82f6 !important; background-color: #1e3a8a !important; }
        
        /* FIX POUR LE BLOCAGE DES FILTRES */
        .sticky-header {
            position: sticky;
            top: 0;
            z-index: 2000;
            background-color: #111827;
            padding-bottom: 1rem;
        }

        #movie-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); z-index: 4000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #1f2937; max-width: 800px; width: 100%; border-radius: 1rem; overflow: hidden; border: 1px solid #374151; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen p-4 md:p-8 text-xs md:text-sm">

    <div class="max-w-5xl mx-auto">
        
        <div class="sticky-header">
            <header class="pt-2">
                <div class="flex flex-col md:flex-row justify-between items-center gap-4 mb-4">
                    <h1 class="text-2xl md:text-3xl font-bold text-blue-400 uppercase tracking-tighter">
                        <i class="fas fa-compact-disc mr-2"></i>Ma Collection
                    </h1>
                    <div class="flex flex-wrap gap-2 bg-gray-800 p-2 rounded-lg border border-gray-700">
                        <button onclick="repairPosters()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-3 py-1.5 rounded text-[10px] font-bold uppercase">Réparer Jaquettes</button>
                        <button onclick="exportCollection()" class="bg-green-600 hover:bg-green-500 text-white px-3 py-1.5 rounded text-[10px] font-bold uppercase">Sauvegarder</button>
                        <button onclick="document.getElementById('importFile').click()" class="bg-orange-600 hover:bg-orange-500 text-white px-3 py-1.5 rounded text-[10px] font-bold uppercase">Ouvrir</button>
                        <input type="file" id="importFile" class="hidden" accept=".json" onchange="importCollection(event)">
                    </div>
                </div>

                <div class="bg-gray-800 p-4 rounded-xl border border-gray-700 shadow-2xl">
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-3">
                        <div class="lg:col-span-2">
                            <input type="text" id="search-bar" oninput="displayMovies()" placeholder="Rechercher un titre..." class="w-full px-4 py-2 bg-gray-900 border border-gray-700 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 text-white">
                        </div>
                        <select id="filter-format" onchange="displayMovies()" class="bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-blue-400 outline-none">
                            <option value="">Tous les formats</option>
                            <option value="Standard">Blu-Ray (Standard / Combo 2D)</option>
                            <option value="4K">4K Ultra HD</option>
                            <option value="3D">Blu-Ray 3D</option>
                            <option value="Steelbook">Steelbook</option>
                        </select>
                        <select id="filter-audio" onchange="displayMovies()" class="bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-blue-400 outline-none">
                            <option value="">Audio</option>
                            <option value="Dolby Atmos">Dolby Atmos</option>
                            <option value="DTS-HD MA">DTS-HD MA</option>
                            <option value="DTS:X">DTS:X</option>
                            <option value="Dolby TrueHD">Dolby TrueHD</option>
                        </select>
                        <select id="filter-nas" onchange="displayMovies()" class="bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-emerald-400 font-bold outline-none">
                            <option value="">État NAS</option>
                            <option value="true">Sur le NAS</option>
                            <option value="false">Hors NAS</option>
                        </select>
                    </div>
                    <div id="movie-count" class="mt-2 text-center text-[9px] uppercase font-black text-gray-400 tracking-widest">CHARGEMENT...</div>
                </div>
            </header>
        </div>

        <section id="form-container" class="bg-gray-800 p-6 rounded-xl shadow-2xl mb-8 border border-gray-700">
            <form id="movie-form" onsubmit="saveMovie(event)">
                <input type="hidden" id="edit-id" value="">
                <div class="grid grid-cols-1 md:grid-cols-6 gap-4 mb-6">
                    <div class="md:col-span-3 relative">
                        <label class="block text-[10px] font-bold text-gray-400 mb-1 uppercase">Titre du film</label>
                        <input type="text" id="title-input" autocomplete="off" required class="w-full bg-gray-700 border-none rounded-lg p-2.5 text-white outline-none focus:ring-2 focus:ring-blue-500">
                        <div id="suggestions" class="absolute left-0 right-0 mt-1 rounded-lg shadow-2xl hidden"></div>
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-[10px] font-bold text-gray-400 mb-1 uppercase">Format de l'édition</label>
                        <select id="format" class="w-full bg-gray-700 border-none rounded-lg p-2.5 outline-none">
                            <option value="Blu-Ray">Blu-Ray</option>
                            <option value="Blu-ray 4K">Blu-ray 4K</option>
                            <option value="Blu-Ray 3D">Blu-Ray 3D</option>
                            <option value="Blu-Ray 4K + 2D">Blu-Ray 4K + 2D</option>
                            <option value="Blu-Ray 3D + 2D">Blu-Ray 3D + 2D</option>
                            <option value="Blu-Ray 4K + 3D + 2D">Blu-Ray 4K + 3D + 2D</option>
                            <option value="Steelbook">Steelbook</option>
                        </select>
                    </div>
                    <div class="md:col-span-1">
                        <label class="block text-[10px] font-bold text-gray-400 mb-1 uppercase">Note /5</label>
                        <input type="number" id="rating" min="0" max="5" step="0.5" value="5" class="w-full bg-gray-700 border-none rounded-lg p-2.5 outline-none">
                    </div>
                </div>

                <div class="flex items-center gap-3 bg-gray-900/50 p-4 rounded-lg border border-gray-700 mb-6 w-fit">
                    <input type="checkbox" id="nas-status" class="w-5 h-5 rounded border-gray-600 bg-gray-700 text-emerald-500">
                    <label for="nas-status" class="text-xs font-bold text-emerald-400 uppercase cursor-pointer"><i class="fas fa-server mr-2"></i>Copié sur le NAS</label>
                </div>

                <div class="bg-gray-900/50 p-4 rounded-lg border border-gray-700 mb-6">
                    <label class="block text-[10px] font-bold text-blue-400 mb-3 uppercase tracking-widest">Audio & Supports</label>
                    <div class="grid grid-cols-2 sm:grid-cols-5 gap-3 mb-4">
                        <select id="temp-support" class="bg-gray-800 rounded p-2 text-xs text-emerald-400 border border-gray-600 outline-none">
                            <option value="2D">2D</option><option value="4K">4K</option><option value="3D">3D</option>
                        </select>
                        <select id="temp-lang" class="bg-gray-700 rounded p-2 text-xs text-white outline-none">
                            <option value="FR">FR</option><option value="EN">EN</option><option value="JP">JP</option>
                        </select>
                        <select id="temp-format" class="bg-gray-700 rounded p-2 text-xs text-white outline-none">
                            <option value="Dolby Atmos">Dolby Atmos</option><option value="DTS-HD MA">DTS-HD MA</option>
                            <option value="DTS:X">DTS:X</option><option value="Dolby TrueHD">Dolby TrueHD</option>
                        </select>
                        <input type="text" id="temp-channels" placeholder="5.1" class="bg-gray-700 rounded p-2 text-xs text-white outline-none">
                        <button type="button" onclick="addAudioTrack()" class="bg-blue-600 hover:bg-blue-500 text-white font-bold text-[10px] rounded uppercase">Ajouter</button>
                    </div>
                    <div id="audio-tracks-preview" class="flex flex-wrap gap-2"></div>
                </div>

                <button type="submit" id="submit-btn" class="w-full bg-blue-600 hover:bg-blue-500 p-3 rounded-lg font-bold uppercase shadow-lg">Enregistrer</button>
            </form>
        </section>

        <div class="bg-gray-800 rounded-xl overflow-hidden shadow-xl border border-gray-700">
            <table class="w-full text-left">
                <tbody id="movie-list" class="divide-y divide-gray-700"></tbody>
            </table>
        </div>
    </div>

    <div id="movie-modal" onclick="closeModal()">
        <div class="modal-content flex flex-col md:flex-row" onclick="event.stopPropagation()">
            <img id="modal-img" src="" class="w-full md:w-1/3 object-cover bg-gray-700" alt="Poster">
            <div class="p-6 md:p-8 flex flex-col justify-between w-full">
                <div>
                    <div class="flex justify-between items-start mb-2">
                        <h2 id="modal-title" class="text-2xl font-bold text-blue-400"></h2>
                        <button onclick="closeModal()" class="text-gray-500 hover:text-white text-3xl">&times;</button>
                    </div>
                    <div id="modal-badges" class="flex flex-wrap gap-2 mb-6">
                        <div id="modal-format-badge" class="px-3 py-1 rounded-full text-[10px] font-bold uppercase"></div>
                        <div id="modal-nas-badge" class="hidden px-3 py-1 rounded-full bg-emerald-600 text-white text-[10px] font-bold uppercase">NAS</div>
                    </div>
                    <div id="modal-audio-sections" class="space-y-4"></div>
                    <p id="modal-desc" class="text-gray-400 text-sm italic mt-6 leading-relaxed"></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // PWA SERVICE WORKER REGISTRATION
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const blob = new Blob([`
                    self.addEventListener('install', (e) => self.skipWaiting());
                    self.addEventListener('fetch', (e) => e.respondWith(fetch(e.request)));
                `], { type: 'application/javascript' });
                const workerUrl = URL.createObjectURL(blob);
                navigator.serviceWorker.register(workerUrl);
            });
        }

        const TMDB_API_KEY = '925dee449263006777b7ccc02e9b92c3';
        let currentSelection = null;
        let currentAudioTracks = [];

        function getMovies() {
            try {
                return JSON.parse(localStorage.getItem('movies') || '[]').map(m => ({
                    ...m, nas: m.nas === true || m.nas === "true", tracks: m.tracks || []
                }));
            } catch (e) { return []; }
        }

        function displayMovies() {
            const movies = getMovies();
            const qTitre = document.getElementById('search-bar').value.toLowerCase();
            const qFormat = document.getElementById('filter-format').value;
            const qAudio = document.getElementById('filter-audio').value;
            const qNas = document.getElementById('filter-nas').value;
            
            let filtered = movies.filter(m => {
                const titleMatch = m.title.toLowerCase().includes(qTitre);
                const formatStr = (m.format || "").toUpperCase();
                let formatMatch = true;
                if (qFormat === "Standard") {
                    const isPure4K = formatStr.includes("4K") && !formatStr.includes("2D");
                    const isPure3D = formatStr.includes("3D") && !formatStr.includes("2D");
                    formatMatch = formatStr.includes("BLU-RAY") && !isPure4K && !isPure3D;
                } else if (qFormat !== "") {
                    formatMatch = formatStr.includes(qFormat.toUpperCase());
                }
                const audioMatch = qAudio === "" || m.tracks.some(t => t.fmt === qAudio);
                const nasMatch = qNas === "" || m.nas.toString() === qNas;
                return titleMatch && formatMatch && audioMatch && nasMatch;
            });

            filtered.sort((a,b) => a.title.localeCompare(b.title));
            const list = document.getElementById('movie-list');
            list.innerHTML = filtered.map(m => `
                <tr class="hover:bg-gray-800/50 transition cursor-pointer" onclick="openDetails(${m.id})">
                    <td class="px-4 py-4 flex items-center gap-4">
                        <img src="${m.poster || 'https://via.placeholder.com/40x60'}" class="w-12 rounded shadow aspect-[2/3] object-cover bg-gray-700">
                        <div class="flex-1">
                            <div class="font-bold text-gray-100">${m.title}</div>
                            <div class="flex flex-wrap gap-1 mt-1">
                                ${m.tracks.map(t => `<span class="px-1.5 py-0.5 bg-gray-900 border border-gray-700 rounded text-[8px] font-bold text-blue-400">${t.lang} • ${t.fmt} ${t.ch || ''}</span>`).join('')}
                            </div>
                        </div>
                    </td>
                    <td class="px-4 py-4 text-right">
                        <div class="flex flex-col items-end gap-1.5">
                            <span class="px-2 py-0.5 rounded text-[9px] font-black uppercase ${getFormatClass(m.format)}">${m.format}</span>
                            ${m.nas ? '<span class="px-2 py-0.5 rounded text-[9px] font-black uppercase bg-emerald-600 text-white">NAS</span>' : ''}
                        </div>
                    </td>
                    <td class="px-4 py-4 text-right" onclick="event.stopPropagation()">
                        <button onclick="editMovie(${m.id})" class="text-gray-500 hover:text-blue-400 p-2"><i class="fas fa-edit"></i></button>
                        <button onclick="deleteMovie(${m.id})" class="text-gray-500 hover:text-red-500 p-2"><i class="fas fa-trash-alt"></i></button>
                    </td>
                </tr>
            `).join('');
            document.getElementById('movie-count').innerText = `${filtered.length} FILM${filtered.length > 1 ? 'S' : ''}`;
        }

        function getFormatClass(f) {
            const up = f.toUpperCase();
            if(up.includes('4K')) return 'badge-4k';
            if(up.includes('3D')) return 'badge-3d';
            return 'bg-blue-600 text-white';
        }

        function addAudioTrack() {
            const track = {
                id: Date.now(),
                support: document.getElementById('temp-support').value,
                lang: document.getElementById('temp-lang').value,
                fmt: document.getElementById('temp-format').value,
                ch: document.getElementById('temp-channels').value || '5.1'
            };
            currentAudioTracks.push(track);
            renderAudioPreview();
        }

        function renderAudioPreview() {
            const container = document.getElementById('audio-tracks-preview');
            container.innerHTML = currentAudioTracks.map(t => `
                <div class="flex items-center gap-2 bg-gray-700 border border-gray-600 px-2 py-1 rounded text-[10px]">
                    <span class="font-black text-emerald-400">${t.support}</span>
                    <span>${t.lang} | ${t.fmt} ${t.ch}</span>
                    <button type="button" onclick="removeAudioTrack(${t.id})" class="text-red-400 ml-1">×</button>
                </div>
            `).join('');
        }

        function removeAudioTrack(id) {
            currentAudioTracks = currentAudioTracks.filter(t => t.id !== id);
            renderAudioPreview();
        }

        function saveMovie(e) {
            e.preventDefault();
            const id = document.getElementById('edit-id').value;
            let movies = getMovies();
            const movieData = {
                id: id ? parseInt(id) : Date.now(),
                title: document.getElementById('title-input').value,
                format: document.getElementById('format').value,
                rating: parseFloat(document.getElementById('rating').value) || 5,
                nas: document.getElementById('nas-status').checked,
                tracks: [...currentAudioTracks],
                overview: currentSelection ? currentSelection.overview : (id ? (movies.find(m => m.id == id)?.overview || "") : ""),
                poster: currentSelection ? currentSelection.poster : (id ? (movies.find(m => m.id == id)?.poster || null) : null)
            };
            if (id) movies = movies.map(m => m.id == id ? movieData : m);
            else movies.push(movieData);
            localStorage.setItem('movies', JSON.stringify(movies));
            exitEditMode();
            displayMovies();
        }

        function editMovie(id) {
            const m = getMovies().find(m => m.id == id);
            if(!m) return;
            document.getElementById('edit-id').value = m.id;
            document.getElementById('title-input').value = m.title;
            document.getElementById('format').value = m.format;
            document.getElementById('nas-status').checked = m.nas;
            document.getElementById('rating').value = m.rating;
            currentAudioTracks = [...m.tracks];
            renderAudioPreview();
            document.getElementById('form-container').classList.add('editing-mode');
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function exitEditMode() {
            document.getElementById('form-container').classList.remove('editing-mode');
            document.getElementById('movie-form').reset();
            document.getElementById('edit-id').value = '';
            currentAudioTracks = [];
            currentSelection = null;
            renderAudioPreview();
        }

        function deleteMovie(id) {
            if(confirm('Supprimer ce film ?')) {
                const movies = getMovies().filter(m => m.id != id);
                localStorage.setItem('movies', JSON.stringify(movies));
                displayMovies();
            }
        }

        function openDetails(id) {
            const m = getMovies().find(m => m.id == id);
            if(!m) return;
            document.getElementById('modal-img').src = m.poster || '';
            document.getElementById('modal-title').innerText = m.title;
            document.getElementById('modal-desc').innerText = m.overview || "Pas de résumé.";
            document.getElementById('modal-format-badge').innerText = m.format;
            document.getElementById('modal-format-badge').className = `px-3 py-1 rounded-full text-[10px] font-bold uppercase ${getFormatClass(m.format)}`;
            document.getElementById('modal-nas-badge').style.display = m.nas ? 'block' : 'none';
            
            const grouped = m.tracks.reduce((acc, t) => {
                acc[t.support] = acc[t.support] || [];
                acc[t.support].push(t);
                return acc;
            }, {});
            document.getElementById('modal-audio-sections').innerHTML = Object.entries(grouped).map(([support, tracks]) => `
                <div>
                    <h5 class="text-[9px] font-black text-blue-500 uppercase border-b border-blue-900 pb-1 mb-2">Disque ${support}</h5>
                    ${tracks.map(t => `<div class="flex justify-between p-2 bg-gray-800/40 rounded text-[11px] mb-1">
                        <span>${t.lang}</span><span class="text-blue-400 font-bold">${t.fmt} ${t.ch}</span>
                    </div>`).join('')}
                </div>
            `).join('');
            document.getElementById('movie-modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('movie-modal').style.display = 'none'; }

        // TMDB
        document.getElementById('title-input').addEventListener('input', function() {
            const q = this.value;
            if(q.length < 2) { document.getElementById('suggestions').classList.add('hidden'); return; }
            fetch(`https://api.themoviedb.org/3/search/movie?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(q)}&language=fr-FR`)
                .then(r => r.json())
                .then(d => {
                    document.getElementById('suggestions').innerHTML = d.results.slice(0,5).map(m => `
                        <div class="suggestion-item p-2.5 bg-gray-800 border-b border-gray-700 text-xs" 
                             onclick="selectMovie('${m.title.replace(/'/g, "\\'")}', '${(m.overview || "").replace(/'/g, "\\'")}', '${m.poster_path}')">
                            ${m.title} (${m.release_date?.split('-')[0] || 'N/A'})
                        </div>
                    `).join('');
                    document.getElementById('suggestions').classList.remove('hidden');
                });
        });

        window.selectMovie = (t, o, p) => {
            document.getElementById('title-input').value = t;
            currentSelection = { overview: o, poster: p ? 'https://image.tmdb.org/t/p/w500' + p : null };
            document.getElementById('suggestions').classList.add('hidden');
        };

        async function repairPosters() {
            let movies = getMovies();
            let rep = 0;
            for (let m of movies) {
                if (!m.poster) {
                    try {
                        const res = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(m.title)}&language=fr-FR`);
                        const data = await res.json();
                        if (data.results?.[0]) {
                            m.poster = 'https://image.tmdb.org/t/p/w500' + data.results[0].poster_path;
                            m.overview = m.overview || data.results[0].overview;
                            rep++;
                        }
                    } catch (err) {}
                }
            }
            localStorage.setItem('movies', JSON.stringify(movies));
            displayMovies();
            alert(rep + " jaquettes récupérées !");
        }

        function exportCollection() {
            const blob = new Blob([localStorage.getItem('movies')], { type: 'application/json' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
            a.download = 'mablu-raytheque.json'; a.click();
        }

        function importCollection(event) {
            const reader = new FileReader();
            reader.onload = (e) => { localStorage.setItem('movies', e.target.result); displayMovies(); };
            reader.readAsText(event.target.files[0]);
        }

        displayMovies();
    </script>
</body>
</html>
