<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Blu-ray Thèque - Version Auto-Réparation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        #suggestions { z-index: 1000 !important; max-height: 350px; overflow-y: auto; background: #1f2937; border: 1px solid #4b5563; }
        .suggestion-item:hover { background-color: #374151; cursor: pointer; }
        .badge-3d { background: linear-gradient(90deg, #00d2ff 0%, #3a7bd5 100%); color: white; }
        .editing-mode { border: 2px solid #3b82f6 !important; background-color: #1e3a8a !important; }
        #movie-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); z-index: 2000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #1f2937; max-width: 800px; width: 100%; border-radius: 1rem; overflow: hidden; border: 1px solid #374151; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen p-4 md:p-8 text-xs md:text-sm">

    <div class="max-w-5xl mx-auto">
        <header class="mb-8 border-b border-gray-700 pb-6">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4 mb-6">
                <h1 class="text-2xl md:text-3xl font-bold text-blue-400 uppercase tracking-tighter"><i class="fas fa-compact-disc mr-2"></i>Ma Collection</h1>
                <div class="flex flex-wrap gap-2 bg-gray-800 p-2 rounded-lg border border-gray-700 justify-center">
                    <button onclick="repairPosters()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-3 py-1.5 rounded text-[10px] font-bold">RÉPARER JAQUETTES</button>
                    <button onclick="exportCollection()" class="bg-green-600 hover:bg-green-500 text-white px-3 py-1.5 rounded text-[10px] font-bold">SAUVEGARDER</button>
                    <button onclick="document.getElementById('importFile').click()" class="bg-orange-600 hover:bg-orange-500 text-white px-3 py-1.5 rounded text-[10px] font-bold">OUVRIR</button>
                    <input type="file" id="importFile" class="hidden" accept=".json" onchange="importCollection(event)">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-6 gap-3 mb-4">
                <input type="text" id="search-bar" oninput="displayMovies()" placeholder="Rechercher un film..." class="md:col-span-3 px-4 py-2 bg-gray-800 border border-gray-600 rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
                
                <select id="filter-audio" onchange="displayMovies()" class="md:col-span-2 bg-gray-800 border border-gray-600 rounded-lg px-3 py-2 text-blue-400 outline-none">
                    <option value="">Tous les sons</option>
                    <option value="Dolby Atmos">Dolby Atmos</option>
                    <option value="DTS-HD MA">DTS-HD MA</option>
                    <option value="DTS:X">DTS:X</option>
                    <option value="Dolby TrueHD">Dolby TrueHD</option>
                    <option value="DTS">DTS</option>
                    <option value="Dolby Digital">Dolby Digital</option>
                </select>

                <div id="movie-count" class="flex items-center justify-center bg-blue-600 rounded-lg font-bold py-2 shadow-lg">0 Films</div>
            </div>
        </header>

        <section id="form-container" class="bg-gray-800 p-6 rounded-xl shadow-2xl mb-8 border border-gray-700">
            <form id="movie-form" onsubmit="saveMovie(event)">
                <input type="hidden" id="edit-id" value="">
                <div class="grid grid-cols-1 md:grid-cols-6 gap-4 mb-6">
                    <div class="md:col-span-3 relative">
                        <label class="block text-[10px] font-bold text-gray-400 mb-1 uppercase">Titre du film</label>
                        <input type="text" id="title-input" autocomplete="off" required class="w-full bg-gray-700 border-none rounded-lg p-2.5 text-white outline-none">
                        <div id="suggestions" class="absolute left-0 right-0 mt-1 rounded-lg shadow-2xl hidden"></div>
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-[10px] font-bold text-gray-400 mb-1 uppercase">Format de l'édition</label>
                        <select id="format" class="w-full bg-gray-700 border-none rounded-lg p-2.5 outline-none">
                            <option value="Blu-Ray">Blu-Ray</option>
                            <option value="Blu-ray 4K">Blu-ray 4K</option>
                            <option value="Blu-Ray 3D">Blu-Ray 3D</option>
                            <option value="Blu-Ray 4K + 3D + 2D">Blu-Ray 4K + 3D + 2D</option>
                            <option value="Blu-Ray 4K + 3D">Blu-Ray 4K + 3D</option>
                            <option value="Blu-Ray 3D + 2D">Blu-Ray 3D + 2D</option>
                            <option value="Steelbook">Steelbook</option>
                        </select>
                    </div>
                    <div class="md:col-span-1">
                        <label class="block text-[10px] font-bold text-gray-400 mb-1 uppercase">Note /5</label>
                        <input type="number" id="rating" min="0" max="5" step="0.5" value="5" class="w-full bg-gray-700 border-none rounded-lg p-2.5 outline-none">
                    </div>
                </div>

                <div class="bg-gray-900/50 p-4 rounded-lg border border-gray-700 mb-6">
                    <label class="block text-[10px] font-bold text-blue-400 mb-3 uppercase tracking-widest">Ajouter des pistes audio</label>
                    <div class="grid grid-cols-2 sm:grid-cols-5 gap-3 mb-4">
                        <select id="temp-support" class="bg-gray-800 rounded p-2 text-xs text-emerald-400 border border-gray-600 outline-none">
                            <option value="2D">Disque 2D</option>
                            <option value="4K">Disque 4K</option>
                            <option value="3D">Disque 3D</option>
                        </select>
                        <select id="temp-lang" class="bg-gray-700 rounded p-2 text-xs text-white outline-none">
                            <option value="FR">FR</option><option value="EN">EN</option><option value="JP">JP</option>
                        </select>
                        <select id="temp-format" class="bg-gray-700 rounded p-2 text-xs text-white outline-none">
                            <option value="Dolby Atmos">Dolby Atmos</option><option value="DTS-HD MA">DTS-HD MA</option>
                            <option value="DTS:X">DTS:X</option><option value="Dolby TrueHD">Dolby TrueHD</option>
                            <option value="DTS">DTS</option><option value="Dolby Digital">Dolby Digital</option>
                        </select>
                        <input type="text" id="temp-channels" placeholder="Ex: 5.1" class="bg-gray-700 rounded p-2 text-xs text-white outline-none">
                        <button type="button" onclick="addAudioTrack()" class="bg-blue-600 hover:bg-blue-500 text-white font-bold text-[10px] rounded uppercase">Ajouter</button>
                    </div>
                    <div id="audio-tracks-preview" class="flex flex-wrap gap-2"></div>
                </div>

                <div class="flex gap-2">
                    <button type="submit" id="submit-btn" class="flex-1 bg-blue-600 hover:bg-blue-500 p-3 rounded-lg font-bold uppercase tracking-widest transition-all">Enregistrer le film</button>
                    <button type="button" id="cancel-edit" onclick="exitEditMode()" class="hidden bg-gray-600 hover:bg-gray-500 px-6 rounded-lg font-bold uppercase">Annuler</button>
                </div>
            </form>
        </section>

        <div class="bg-gray-800 rounded-xl overflow-hidden shadow-xl border border-gray-700">
            <table class="w-full text-left">
                <tbody id="movie-list" class="divide-y divide-gray-700"></tbody>
            </table>
        </div>
    </div>

    <div id="movie-modal" onclick="closeModal()">
        <div class="modal-content flex flex-col md:flex-row" onclick="event.stopPropagation()">
            <img id="modal-img" src="" class="w-full md:w-1/3 object-cover bg-gray-700" alt="Poster">
            <div class="p-6 md:p-8 flex flex-col justify-between w-full">
                <div>
                    <div class="flex justify-between items-start mb-4">
                        <h2 id="modal-title" class="text-2xl font-bold text-blue-400"></h2>
                        <button onclick="closeModal()" class="text-gray-500 hover:text-white text-3xl leading-none">&times;</button>
                    </div>
                    <div id="modal-format-badge" class="inline-block px-3 py-1 rounded-full text-[10px] font-bold uppercase mb-6"></div>
                    <div id="modal-audio-sections" class="space-y-4"></div>
                    <p id="modal-desc" class="text-gray-400 text-sm italic mt-6 leading-relaxed"></p>
                </div>
                <div id="modal-stars" class="text-yellow-500 text-xl border-t border-gray-700 pt-4 mt-4"></div>
            </div>
        </div>
    </div>

    <script>
        const TMDB_API_KEY = '925dee449263006777b7ccc02e9b92c3';
        let currentSelection = null;
        let currentAudioTracks = [];

        function getMovies() {
            try {
                let data = JSON.parse(localStorage.getItem('movies') || '[]');
                return data.map(m => {
                    if (!m.tracks) m.tracks = [];
                    m.tracks = m.tracks.map(t => ({
                        ...t,
                        support: (t.support === 'Général' || !t.support) ? '2D' : t.support,
                        ch: t.ch || '5.1'
                    }));
                    return m;
                });
            } catch (e) { return []; }
        }

        async function repairPosters() {
            let movies = getMovies();
            let repairedCount = 0;
            const toRepair = movies.filter(m => !m.poster || m.poster === "");
            
            if (toRepair.length === 0) {
                alert("Toutes les jaquettes sont déjà présentes !");
                return;
            }

            if (!confirm(`Tentative de récupération de ${toRepair.length} jaquette(s) manquante(s). Continuer ?`)) return;

            for (let movie of movies) {
                if (!movie.poster || movie.poster === "") {
                    try {
                        const response = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(movie.title)}&language=fr-FR`);
                        const data = await response.json();
                        if (data.results && data.results.length > 0) {
                            const match = data.results[0];
                            movie.poster = match.poster_path ? 'https://image.tmdb.org/t/p/w500' + match.poster_path : null;
                            movie.overview = movie.overview || match.overview;
                            repairedCount++;
                        }
                    } catch (err) { console.error("Erreur réparation :", err); }
                }
            }

            localStorage.setItem('movies', JSON.stringify(movies));
            displayMovies();
            alert(`${repairedCount} jaquette(s) récupérée(s) avec succès !`);
        }

        function saveMovie(e) {
            e.preventDefault();
            const id = document.getElementById('edit-id').value;
            let movies = getMovies();
            
            const movieData = {
                id: id ? parseInt(id) : Date.now(),
                title: document.getElementById('title-input').value,
                format: document.getElementById('format').value,
                rating: parseFloat(document.getElementById('rating').value) || 5,
                tracks: [...currentAudioTracks],
                overview: currentSelection ? currentSelection.overview : (id ? (movies.find(m => m.id == id)?.overview || "") : ""),
                poster: currentSelection ? currentSelection.poster : (id ? (movies.find(m => m.id == id)?.poster || null) : null)
            };

            if (id) movies = movies.map(m => m.id == id ? movieData : m);
            else movies.push(movieData);

            localStorage.setItem('movies', JSON.stringify(movies));
            exitEditMode();
            displayMovies();
        }

        function displayMovies() {
            const movies = getMovies();
            const q = document.getElementById('search-bar').value.toLowerCase();
            const audioFilter = document.getElementById('filter-audio').value;
            
            let filtered = movies.filter(m => {
                const matchTitle = m.title.toLowerCase().includes(q);
                const matchAudio = audioFilter === "" || m.tracks.some(t => t.fmt === audioFilter);
                return matchTitle && matchAudio;
            });

            filtered.sort((a,b) => a.title.localeCompare(b.title));

            const list = document.getElementById('movie-list');
            list.innerHTML = filtered.map(m => {
                const isMulti = m.format.includes('+');
                return `
                <tr class="hover:bg-gray-800/50 transition cursor-zoom-in" onclick="openDetails(${m.id})">
                    <td class="px-4 py-4 flex items-center gap-4">
                        <img src="${m.poster || 'https://via.placeholder.com/40x60'}" class="w-12 rounded shadow-md aspect-[2/3] object-cover bg-gray-700">
                        <div class="flex-1">
                            <div class="font-bold text-gray-100">${m.title}</div>
                            <div class="flex flex-wrap gap-1 mt-1">
                                ${m.tracks.map(t => `
                                    <span class="px-1.5 py-0.5 bg-gray-900 border border-gray-700 rounded text-[8px] font-bold">
                                        ${isMulti ? `<span class="text-emerald-400">${t.support}</span> • ` : ''}
                                        ${t.lang} • ${t.fmt} <span class="text-blue-400 font-black ml-0.5">${t.ch}</span>
                                    </span>
                                `).join('')}
                            </div>
                        </div>
                    </td>
                    <td class="px-4 py-4 text-center">
                        <span class="px-2 py-1 rounded text-[10px] font-bold uppercase ${getFormatClass(m.format)}">${m.format}</span>
                    </td>
                    <td class="px-4 py-4 text-right" onclick="event.stopPropagation()">
                        <button onclick="editMovie(${m.id})" class="text-gray-500 hover:text-blue-400 p-2"><i class="fas fa-edit"></i></button>
                        <button onclick="deleteMovie(${m.id})" class="text-gray-500 hover:text-red-500 p-2"><i class="fas fa-trash-alt"></i></button>
                    </td>
                </tr>
            `}).join('');
            document.getElementById('movie-count').innerText = `${filtered.length} Film${filtered.length > 1 ? 's' : ''}`;
        }

        function addAudioTrack() {
            const track = {
                id: Date.now(),
                support: document.getElementById('temp-support').value,
                lang: document.getElementById('temp-lang').value,
                fmt: document.getElementById('temp-format').value,
                ch: document.getElementById('temp-channels').value || '5.1'
            };
            currentAudioTracks.push(track);
            renderAudioPreview();
            document.getElementById('temp-channels').value = '';
        }

        function removeAudioTrack(id) {
            currentAudioTracks = currentAudioTracks.filter(t => t.id !== id);
            renderAudioPreview();
        }

        function renderAudioPreview() {
            const container = document.getElementById('audio-tracks-preview');
            container.innerHTML = currentAudioTracks.map(t => `
                <div class="flex items-center gap-2 bg-gray-700 border border-gray-600 px-2 py-1 rounded text-[10px]">
                    <span class="font-black text-emerald-400">Disque ${t.support}</span>
                    <span>${t.lang} | ${t.fmt} <span class="text-blue-400 font-bold">(${t.ch})</span></span>
                    <button type="button" onclick="removeAudioTrack(${t.id})" class="text-red-400 font-bold ml-1">×</button>
                </div>
            `).join('');
        }

        function editMovie(id) {
            const m = getMovies().find(m => m.id == id);
            if(!m) return;
            document.getElementById('edit-id').value = m.id;
            document.getElementById('title-input').value = m.title;
            document.getElementById('format').value = m.format;
            document.getElementById('rating').value = m.rating;
            currentAudioTracks = [...m.tracks];
            renderAudioPreview();
            document.getElementById('form-container').classList.add('editing-mode');
            document.getElementById('submit-btn').innerText = 'METTRE À JOUR';
            document.getElementById('cancel-edit').classList.remove('hidden');
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function exitEditMode() {
            document.getElementById('form-container').classList.remove('editing-mode');
            document.getElementById('movie-form').reset();
            document.getElementById('edit-id').value = '';
            document.getElementById('submit-btn').innerText = 'ENREGISTRER LE FILM';
            document.getElementById('cancel-edit').classList.add('hidden');
            currentAudioTracks = [];
            currentSelection = null;
            renderAudioPreview();
        }

        function deleteMovie(id) {
            if(confirm('Supprimer ce film ?')) {
                const movies = getMovies().filter(m => m.id != id);
                localStorage.setItem('movies', JSON.stringify(movies));
                displayMovies();
            }
        }

        function openDetails(id) {
            const m = getMovies().find(m => m.id == id);
            if(!m) return;
            document.getElementById('modal-img').src = m.poster || '';
            document.getElementById('modal-title').innerText = m.title;
            document.getElementById('modal-desc').innerText = m.overview || "Aucun résumé.";
            
            const badge = document.getElementById('modal-format-badge');
            badge.innerText = m.format;
            badge.className = `inline-block px-3 py-1 rounded-full text-[10px] font-bold uppercase mb-4 ${getFormatClass(m.format)}`;
            
            const grouped = m.tracks.reduce((acc, t) => {
                acc[t.support] = acc[t.support] || [];
                acc[t.support].push(t);
                return acc;
            }, {});

            document.getElementById('modal-audio-sections').innerHTML = Object.entries(grouped).map(([support, tracks]) => `
                <div>
                    <h5 class="text-[9px] font-black text-blue-500 uppercase border-b border-blue-900 pb-1 mb-2">Disque ${support}</h5>
                    ${tracks.map(t => `<div class="flex justify-between p-2 bg-gray-800/40 rounded text-[11px] mb-1">
                        <span class="font-bold">${t.lang}</span>
                        <span class="text-blue-400 font-black">${t.fmt} <span class="text-blue-400 font-black ml-2">${t.ch}</span></span>
                    </div>`).join('')}
                </div>
            `).join('');

            document.getElementById('movie-modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('movie-modal').style.display = 'none'; }

        function getFormatClass(f) {
            if(f.includes('4K')) return 'bg-purple-600 text-white';
            if(f.includes('3D')) return 'badge-3d';
            if(f === 'Steelbook') return 'bg-amber-500 text-black';
            return 'bg-blue-600 text-white';
        }

        function exportCollection() {
            const blob = new Blob([localStorage.getItem('movies')], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'ma_collection_bluray.json';
            a.click();
        }

        function importCollection(e) {
            const reader = new FileReader();
            reader.onload = (event) => {
                localStorage.setItem('movies', event.target.result);
                displayMovies();
                alert("Collection importée avec succès !");
            };
            reader.readAsText(e.target.files[0]);
        }

        document.getElementById('title-input').addEventListener('input', function() {
            const q = this.value;
            if(q.length < 2) { document.getElementById('suggestions').classList.add('hidden'); return; }
            fetch(`https://api.themoviedb.org/3/search/movie?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(q)}&language=fr-FR`)
                .then(r => r.json())
                .then(d => {
                    document.getElementById('suggestions').innerHTML = d.results.slice(0,5).map(m => `
                        <div class="suggestion-item p-2.5 bg-gray-800 border-b border-gray-700 text-xs" 
                             onclick="selectMovie('${m.title.replace(/'/g, "\\'")}', '${(m.overview || "").replace(/'/g, "\\'")}', '${m.poster_path}')">
                            ${m.title} (${m.release_date ? m.release_date.split('-')[0] : 'N/A'})
                        </div>
                    `).join('');
                    document.getElementById('suggestions').classList.remove('hidden');
                });
        });

        window.selectMovie = (t, o, p) => {
            document.getElementById('title-input').value = t;
            currentSelection = { overview: o, poster: p ? 'https://image.tmdb.org/t/p/w500' + p : null };
            document.getElementById('suggestions').classList.add('hidden');
        };

        displayMovies();
    </script>
</body>
</html>
